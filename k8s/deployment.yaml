apiVersion: apps/v1
kind: Deployment
metadata:
  name: gobo
  labels:
    app: gobo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gobo
  template:
    metadata:
      labels:
        app: gobo
    spec:
      containers:
        - name: gobo
          image: gobo-image
          ports:
            - containerPort: 8080
          env:
            - name: DD_DYNAMIC_INSTRUMENTATION_ENABLED
              value: "true"
            - name: RAILS_SERVE_STATIC_FILES
              value: "true"
            - name: DD_TRACE_DEBUG
              value: "true"
            - name: RAILS_ENV
              value: "production"
            - name: SECRET_KEY_BASE
              value: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0"
---
apiVersion: v1
kind: Service
metadata:
  name: gobo
  labels:
    app: gobo
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: gobo
