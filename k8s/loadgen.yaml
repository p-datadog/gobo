apiVersion: apps/v1
kind: Deployment
metadata:
  name: gobo-loadgen
  labels:
    app: gobo-loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gobo-loadgen
  template:
    metadata:
      labels:
        app: gobo-loadgen
    spec:
      containers:
        - name: loadgen
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              ENDPOINTS="
              /
              /help
              /about
              /contact
              /signup
              /login
              /debugger_test/calculate
              /debugger_test/circuit_breaker
              /debugger_test/binary_data_param
              /debugger_test/binary_data
              /debugger_test/json_error
              /di_status
              "
              while true; do
                for path in $ENDPOINTS; do
                  curl -s -o /dev/null -w "%{http_code} %{time_total}s $path\n" "http://gobo:8080${path}" || true
                  sleep 2
                done
              done
